name: "CI - main branch of deps"
on:
  push:
    branches:
      - main
  schedule:
    # At 07:00 UTC on Monday and Thursday
    - cron: "0 7 * * *"
  workflow_dispatch:


concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

defaults:
  run:
    shell: bash -l {0}

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    name: "${{ matrix.os }} - ${{ matrix.python-version }}"
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python-version:
          - "3.12"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup Micromamba"
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: devtools/latest_environment.yml
          environment-name: pontibus-dev
          create-args: >-
            python=${{ matrix.python-version }}
          init-shell: bash

      - name: "Install"
        run: python -m pip install --no-deps -e .

      - name: "Test imports"
        run: |
          # if we add more to this, consider changing to for + env vars
          python -Ic "import pontibus; print(pontibus.__version__)"

      - name: "Environment Information"
        run: |
          micromamba info
          micromamba list
          pip list

      - name: "Run tests"
        env:
          PONTIBUS_SLOW_TESTS: TRUE
          PONTIBUS_CPUVSLOW_TESTS: FALSE
          PONTIBUS_GPU_TESTS: FALSE
          DUECREDIT_ENABLE: 'yes'
        run: |
          pytest -n logical -v --durations=10
