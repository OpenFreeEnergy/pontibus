name: pontibus-docs
channels:
- conda-forge
dependencies:
- autodoc-pydantic>=2.0
#- openfe-base=1.8
- numpy <2.4
- networkx
- packaging
- plugcli
- python=3.12
- sphinx
- sphinx-click
- gitpython
- libsass
- nbsphinx
- nbsphinx-link
- myst-parser
- pip
# These are added automatically by RTD, so we include them here
# for a consistent environment.
- mock
- pillow
- pip:
  - sphinx-design
  - sphinx-toolbox
  - git+https://github.com/OpenFreeEnergy/ofe-sphinx-theme@main
  - git+https://github.com/OpenFreeEnergy/openfe@v1.8.1
  - git+https://github.com/OpenFreeEnergy/gufe@v1.7.0



